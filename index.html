<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Her Story - Film Level</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family: Georgia, serif;
}

/* FRAME */
#film{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* CINEMATIC LAYERS */
.scene{
  position:absolute;
  inset:-10%;
  opacity:0;
  transition:opacity 2s ease;
  transform:scale(1.1);
}

/* ACTIVE SCENE */
.scene.active{
  opacity:1;
}

/* PARALLAX DEPTH */
.layer{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
}

/* BACKGROUND COLOR GRADING */
#s1 .layer{background:linear-gradient(to bottom,#0b132b,#1c2541);}
#s2 .layer{background:linear-gradient(to bottom,#1b263b,#0d1b2a);}
#s3 .layer{background:linear-gradient(to bottom,#2d6a4f,#081c15);}
#s4 .layer{background:linear-gradient(to bottom,#6a040f,#370617);}
#s5 .layer{background:linear-gradient(to bottom,#3a0ca3,#10002b);}
#s6 .layer{background:linear-gradient(to bottom,#111827,#000);}
#s7 .layer{background:linear-gradient(to bottom,#1f2937,#000);}
#s8 .layer{background:linear-gradient(to bottom,#000,#111);}
#s9 .layer{background:linear-gradient(to bottom,#0a0a0a,#000);}
#s10 .layer{background:linear-gradient(to bottom,#000,#050505);}

/* CINEMATIC VIGNETTE */
.scene::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center,
    transparent 35%,
    rgba(0,0,0,0.6) 70%,
    rgba(0,0,0,0.95));
}

/* FILM GRAIN */
#film::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  opacity:0.12;
  mix-blend-mode:overlay;
  pointer-events:none;
}

/* CAPTION */
#caption{
  position:absolute;
  bottom:70px;
  width:100%;
  text-align:center;
  color:#f5f5f5;
  font-size:20px;
  letter-spacing:0.5px;
  opacity:0;
  transform:translateY(10px);
  transition:opacity 1s ease, transform 1s ease;
  padding:0 20px;
}

#caption.show{
  opacity:1;
  transform:translateY(0);
}

/* SLOW CINEMATIC ZOOM */
@keyframes zoom {
  from { transform:scale(1.1); }
  to { transform:scale(1.18); }
}

.scene.active{
  animation:zoom 6s linear forwards;
}
</style>
</head>

<body>

<div id="film">

<div id="caption"></div>

<div class="scene active" id="s1"><div class="layer"></div></div>
<div class="scene" id="s2"><div class="layer"></div></div>
<div class="scene" id="s3"><div class="layer"></div></div>
<div class="scene" id="s4"><div class="layer"></div></div>
<div class="scene" id="s5"><div class="layer"></div></div>
<div class="scene" id="s6"><div class="layer"></div></div>
<div class="scene" id="s7"><div class="layer"></div></div>
<div class="scene" id="s8"><div class="layer"></div></div>
<div class="scene" id="s9"><div class="layer"></div></div>
<div class="scene" id="s10"><div class="layer"></div></div>

</div>

<script>

const scenes = document.querySelectorAll(".scene");

const text = [
"Together, they built a home.",
"He went out every day.",
"She stayed back… holding everything together.",
"She studied quietly for her future.",
"She waited… every night.",
"But he never really saw her.",
"Silence became the language of the house.",
"Even in pain, she stood alone.",
"He turned her feelings into blame.",
"So she chose herself and left."
];

let i = 0;

function showScene(){
  scenes.forEach(s => s.classList.remove("active"));
  scenes[i].classList.add("active");

  const cap = document.getElementById("caption");
  cap.classList.remove("show");

  setTimeout(()=>{
    cap.innerText = text[i];
    cap.classList.add("show");
  },600);
}

function start(){
  showScene();

  setInterval(()=>{
    i++;
    if(i < scenes.length){
      showScene();
    }
  }, 6000);
}

window.onload = start;

</script>

</body>
</html>
