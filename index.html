<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Her Story</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Crimson+Text:ital@1&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0d0010;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-direction:column;}

#film{position:relative;width:360px;height:620px;background:#111;border-radius:20px;overflow:hidden;box-shadow:0 0 80px rgba(220,100,255,0.2),0 0 160px rgba(180,80,255,0.08);}
.scene{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity 0.9s ease;}
.scene.active{opacity:1;}

#progress{position:absolute;top:0;left:0;height:3px;z-index:999;background:linear-gradient(90deg,#f0abfc,#818cf8);width:0%;transition:none;}

#caption{
  position:absolute;bottom:0;left:0;right:0;z-index:998;
  padding:10px 16px 18px;
  background:linear-gradient(transparent,rgba(0,0,0,0.84));
  font-family:'Crimson Text',serif;font-style:italic;
  font-size:15px;color:#f0e6ff;text-align:center;line-height:1.55;
  min-height:58px;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.5s;
}
#caption.show{opacity:1;}

#title-screen{
  position:absolute;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 50% 60%,#1e0035 0%,#000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  transition:opacity 1s ease;
}
#title-screen h1{font-family:'Playfair Display',serif;font-style:italic;font-size:44px;color:#f0abfc;text-shadow:0 0 40px rgba(240,171,252,0.55);animation:fadeUp 1.2s ease both;}
#title-screen span{font-family:'Crimson Text',serif;font-style:italic;color:rgba(255,255,255,0.4);font-size:14px;animation:fadeUp 1.8s ease both;}
#play-btn{margin-top:22px;background:linear-gradient(135deg,#d946ef,#7c3aed);border:none;color:#fff;font-family:'Playfair Display',serif;font-style:italic;font-size:17px;padding:13px 40px;border-radius:30px;cursor:pointer;animation:fadeUp 2.2s ease both;box-shadow:0 0 30px rgba(217,70,239,0.4);transition:transform 0.2s;}
#play-btn:hover{transform:scale(1.05);}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes houseRise{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes cloudMove{0%{transform:translateX(0)}100%{transform:translateX(40px)}}
@keyframes smoke{0%{transform:translateY(0);opacity:.7}100%{transform:translateY(-28px);opacity:0}}
@keyframes flowerBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes husbandWalk{0%{transform:translateX(0)}100%{transform:translateX(230px)}}
@keyframes legSwingL{0%,100%{transform:rotate(18deg)}50%{transform:rotate(-18deg)}}
@keyframes legSwingR{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(18deg)}}
@keyframes wifeWave{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-22deg)}}
@keyframes stir{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(18deg)}}
@keyframes steam{0%{transform:translateY(0) scaleX(1);opacity:.7}100%{transform:translateY(-30px) scaleX(1.4);opacity:0}}
@keyframes noteFloat{0%{transform:translateY(0);opacity:.8}100%{transform:translateY(-40px);opacity:0}}
@keyframes heartPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
@keyframes sweep{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(22deg)}}
@keyframes dustFloat{0%{transform:translate(0,0);opacity:.6}100%{transform:translate(-30px,-20px);opacity:0}}
@keyframes sunRays{0%,100%{opacity:.3}50%{opacity:.7}}
@keyframes pencilWrite{0%,100%{transform:rotate(-10deg) translateX(0)}50%{transform:rotate(-10deg) translateX(8px)}}
@keyframes tvFlicker{0%,100%{opacity:1}45%{opacity:.7}50%{opacity:.95}}
@keyframes wifeApproach{0%{transform:translateX(80px)}100%{transform:translateX(0)}}
@keyframes dotdot{0%,100%{opacity:.15}50%{opacity:.6}}
@keyframes drip{0%{transform:translateY(0);opacity:1}100%{transform:translateY(18px);opacity:0}}
@keyframes sob{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
@keyframes tearDrop{0%{transform:translateY(0);opacity:1}100%{transform:translateY(14px);opacity:0}}
@keyframes phoneGlow{0%,100%{opacity:.2}50%{opacity:.05}}
@keyframes rage{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
@keyframes crack{0%{opacity:0;transform:scale(0.5)}100%{opacity:.7;transform:scale(1)}}
@keyframes shockwave{0%{transform:scale(0);opacity:.8}100%{transform:scale(3);opacity:0}}
@keyframes fingerPoint{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
@keyframes wifeShrink{0%{transform:scale(1)}100%{transform:scale(0.88) translateX(-12px)}}
@keyframes wordsFly{0%{opacity:0;transform:translateX(30px)}30%{opacity:1}100%{opacity:1;transform:translateX(0)}}
@keyframes walkFree{0%{transform:translateX(0)}100%{transform:translateX(260px)}}
@keyframes wingFlap{0%,100%{transform:scaleX(1) rotate(-5deg)}50%{transform:scaleX(1.15) rotate(5deg)}}
@keyframes sparkle{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0)}}
@keyframes dawnRise{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</head>
<body>
<div id="film">
  <div id="progress"></div>
  <div id="caption"></div>

  <!-- TITLE -->
  <div id="title-screen">
    <h1>Her Story</h1>
    <span>a silent life &nbsp;·&nbsp; a loud truth</span>
    <button id="play-btn" onclick="startFilm()">▶ &nbsp;Play</button>
  </div>

  <!-- S1 · THE HOME -->

        <rect x="238" y="220" width="20" height="48" fill="#9ca3af"/>

        <ellipse cx="245" cy="200" rx="5" ry="4" fill="#d1d5db" style="animation:smoke 1.4s .5s ease-in-out infinite"/>

        <circle cx="207" cy="435" r="4" fill="#fef3c7"/>
        <rect x="106" y="338" width="46" height="38" rx="4" fill="#bae6fd"/>

        <line x1="228" y1="357" x2="274" y2="357" stroke="#7dd3fc" stroke-width="1.5"/>
      </g>
      <g style="animation:flowerBob 2s ease-in-out infinite"><circle cx="108" cy="474" r="7" fill="#f472b6"/><rect x="106" y="474" width="4" height="12" fill="#16a34a"/></g>

      <g style="animation:flowerBob 1.8s ease-in-out infinite"><circle cx="268" cy="473" r="7" fill="#a78bfa"/><rect x="266" y="473" width="4" height="12" fill="#16a34a"/></g>
    </svg>
  </div>

  <!-- S2 · HUSBAND LEAVES -->

      <ellipse cx="262" cy="397" rx="11" ry="8" fill="#f97316"/>

        <ellipse cx="20" cy="130" rx="17" ry="28" fill="#f9a8d4"/>

  <!-- S5 · SHE STUDIES · DAYTIME -->
  <div class="scene" id="s5">
    <svg width="360" height="620" viewBox="0 0 360 620" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fffbeb"/><stop offset="100%" stop-color="#fef9c3"/></linearGradient></defs>
      <rect width="360" height="620" fill="url(#bg5)"/>

      <line x1="281" y1="38" x2="281" y2="180" stroke="#7dd3fc" stroke-width="2"/>

      <!-- table -->
      <rect x="48" y="408" width="252" height="18" rx="4" fill="#78350f"/>
      <rect x="56" y="424" width="12" height="106" rx="3" fill="#92400e"/>
      <rect x="275" y="424" width="12" height="106" rx="3" fill="#92400e"/>
      <!-- books -->
      <rect x="68" y="383" width="18" height="26" rx="2" fill="#ef4444"/>
      <rect x="88" y="386" width="16" height="23" rx="2" fill="#3b82f6"/>
      <rect x="106" y="384" width="14" height="25" rx="2" fill="#10b981"/>
      <!-- open notebook -->
      <rect x="128" y="372" width="96" height="62" rx="4" fill="white"/>
      <line x1="176" y1="372" x2="176" y2="434" stroke="#e2e8f0" stroke-width="1.5"/>
      <line x1="136" y1="386" x2="174" y2="386" stroke="#e2e8f0" stroke-width="1"/>

<audio id="bg" loop><source src="music.mp3" type="audio/mpeg"></audio>

<script>
const SCENES=[
  {id:'s1', dur:6000, cap:'Once upon a time, they shared a home — small, warm, full of hope.'},
  {id:'s2', dur:6000, cap:'Every morning he left for work. She waved from the door, smiling.'},
  {id:'s3', dur:6000, cap:'She cooked with joy, humming to herself. The house smelled of love.'},
  {id:'s4', dur:5500, cap:'She swept, she tidied, she made it a home — joyfully, without complaint.'},
  {id:'s5', dur:6500, cap:'During the day, while he was away, she opened her books. She had dreams too.'},
  {id:'s6', dur:6000, cap:'She set the table every night. He scrolled. He never once looked up.'},
  {id:'s7', dur:7000, cap:'She fell ill and walked to the hospital alone. No call came. No one came.'},
  {id:'s8', dur:5500, cap:'The loneliness she had swallowed for years finally rose. She could not be silent.'},
  {id:'s9', dur:6500, cap:'"It\'s ALL your fault," he said. "You are the problem. Leave." A narcissist\'s finale.'},
  {id:'s10',dur:8000, cap:'She picked up her suitcase and walked into her own light. She had wings all along.'},
];
const TOTAL=SCENES.reduce((a,s)=>a+s.dur,0);
const capEl=document.getElementById('caption');
const bar=document.getElementById('progress');
const audio=document.getElementById('bg');
let startTime=0, sceneIdx=0, timer=null, rafId=null;

function showCaption(t){
  capEl.classList.remove('show');
  setTimeout(()=>{capEl.innerText=t;capEl.classList.add('show');},350);
}
function activateScene(i){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  document.getElementById(SCENES[i].id).classList.add('active');
  showCaption(SCENES[i].cap);
}
function scheduleNext(i){
  clearTimeout(timer);
  timer=setTimeout(()=>{
    const next=(i+1)%SCENES.length;
    sceneIdx=next;
    activateScene(next);
    if(next===0) startTime=Date.now();
    scheduleNext(next);
  },SCENES[i].dur);
}
function tick(){
  const elapsed=Date.now()-startTime;
  bar.style.width=Math.min(100,(elapsed/TOTAL)*100)+'%';
  rafId=requestAnimationFrame(tick);
}
function startFilm(){
  const t=document.getElementById('title-screen');
  t.style.opacity='0';
  setTimeout(()=>t.style.display='none',1000);
  sceneIdx=0; startTime=Date.now();
  activateScene(0); scheduleNext(0);
  rafId=requestAnimationFrame(tick);
  audio.volume=0.38;
  audio.play().catch(()=>{});
}
// tap to toggle music
document.getElementById('film').addEventListener('click',()=>{
  if(audio.paused) audio.play().catch(()=>{});
  else audio.pause();
});
</script>
