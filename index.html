<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Her Story</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:black;
  overflow:hidden;
  font-family: Georgia, serif;
}

#film{
  width:100vw;
  height:100vh;
  position:relative;
}

/* SCENES */
.scene{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:opacity 1.2s ease, transform 6s ease;
  transform:scale(1);
}

/* ACTIVE SCENE */
.scene.active{
  opacity:1;
  transform:scale(1.08);
}

/* BACKGROUNDS (LOCAL SAFE COLORS = NO BLANK ISSUES) */
#s1{background:linear-gradient(to bottom,#1e3a8a,#0f172a);}
#s2{background:linear-gradient(to bottom,#334155,#0f172a);}
#s3{background:linear-gradient(to bottom,#065f46,#022c22);}
#s4{background:linear-gradient(to bottom,#7c2d12,#0f172a);}
#s5{background:linear-gradient(to bottom,#4c1d95,#0f172a);}
#s6{background:linear-gradient(to bottom,#111827,#000000);}
#s7{background:linear-gradient(to bottom,#1f2937,#000000);}
#s8{background:linear-gradient(to bottom,#0f172a,#000000);}
#s9{background:linear-gradient(to bottom,#3f3f46,#000000);}
#s10{background:linear-gradient(to bottom,#000000,#111827);}

/* TEXT */
#caption{
  position:absolute;
  bottom:60px;
  width:100%;
  text-align:center;
  color:white;
  font-size:18px;
  padding:0 20px;
  opacity:0;
  transition:opacity .8s ease;
}

#caption.show{opacity:1;}

/* CINEMATIC DARK OVERLAY */
.scene::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.8));
}
</style>
</head>

<body>

<div id="film">

<div id="caption"></div>

<div class="scene" id="s1"></div>
<div class="scene" id="s2"></div>
<div class="scene" id="s3"></div>
<div class="scene" id="s4"></div>
<div class="scene" id="s5"></div>
<div class="scene" id="s6"></div>
<div class="scene" id="s7"></div>
<div class="scene" id="s8"></div>
<div class="scene" id="s9"></div>
<div class="scene" id="s10"></div>

</div>

<script>

const scenes = ["s1","s2","s3","s4","s5","s6","s7","s8","s9","s10"];

const captions = [
"Together, they built a home.",
"He went to work every day.",
"She took care of the house.",
"She studied quietly… for herself.",
"She waited for him every night.",
"But he never noticed her waiting.",
"Silence became normal.",
"Even in pain… she was alone.",
"Misunderstanding replaced love.",
"So she chose herself and left."
];

let i = 0;

function showScene(){
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  document.getElementById(scenes[i]).classList.add("active");

  const cap = document.getElementById("caption");
  cap.classList.remove("show");

  setTimeout(()=>{
    cap.innerText = captions[i];
    cap.classList.add("show");
  },400);
}

function start(){
  showScene();

  setInterval(()=>{
    i++;
    if(i < scenes.length){
      showScene();
    }
  }, 5000);
}

window.onload = start;

</script>

</body>
</html>
